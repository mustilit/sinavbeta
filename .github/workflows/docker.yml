name: Docker build and compose validation

on:
  push:
    branches:
      - main

jobs:
  docker-build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Prod compose `env_file: ../../.env` ister; .env gitignore'da (secret) → CI'da yok.
      # Doğrulama için .env.example'dan placeholder üret (gerçek değer gerekmez; sadece
      # sözdizimi kontrolü, eksik değişkenler hata değil yalnız uyarı verir).
      - name: Prepare placeholder .env for compose validation
        run: cp .env.example .env

      - name: Validate dev docker-compose
        run: docker compose -f infra/docker/docker-compose.yml config

      - name: Validate prod docker-compose
        run: docker compose -f infra/docker/docker-compose.prod.yml config

      - name: Build backend image
        run: |
          docker build \
            -f infra/docker/backend.Dockerfile \
            -t dal-backend:ci \
            apps/backend

      # Optional: push to GitHub Container Registry (configure GHCR_PAT / permissions first)
