services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sinavsalonu_v2}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    image: dal-backend:prod
    build:
      context: ../../apps/backend
      dockerfile: ../../infra/docker/backend.Dockerfile
      args:
        # NOT: compose interpolation default'unda `:-"x"` literal tırnak üretir;
        # `environment:` değerlerinde bu container env'ini bozar (CSP/REDIS bkz.).
        # Tutarlılık için tüm default'lar tırnaksız.
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      # E-posta sağlayıcı secret'ları (SMTP şifresi/API key) AES-256-GCM ile bu
      # anahtarla şifrelenir. Backend "Yeni Sağlayıcı Ekle"de şifreyi encrypt eder;
      # tanımsızsa encryptSecret() fırlatır → "Oluşturulamadı". Worker zaten env_file
      # ile alıyordu; backend explicit allow-list'inde eksikti (eklendi).
      EMAIL_SECRETS_KEY: ${EMAIL_SECRETS_KEY}
      PORT: ${PORT:-3000}
      CLIENT_URL: ${CLIENT_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_DISABLED: "0"
      CRON_DISABLED: "0"
      TRUST_PROXY: ${TRUST_PROXY:-1}
      # config/redis.ts guard'ı: redis host'u "redis" ise DOCKER=1 zorunlu. Compose
      # ile çalışan HER ortamda (staging + canlı) geçerli; override'a değil prod
      # compose'a konur ki tek başına `docker compose -f prod.yml up` çalışsın.
      DOCKER: "1"
    # Yüklenen dosyalar (CV/kapak/avatar) named volume'da KALICI tutulur.
    # Aksi halde her backend recreate/deploy container-local uploads'ı siler
    # → kullanıcı yüklediği görseller kaybolur (üretimde yaşandı, 2026-06-07).
    volumes:
      - uploads_data:/usr/src/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: dal-backend:prod
    command: npm run start:worker
    depends_on:
      redis:
        condition: service_healthy
    # Worker DATABASE_URL + e-posta sağlayıcı secret'larına ihtiyaç duyar; backend
    # gibi açık liste yerine tüm .env enjekte edilir (DB'siz worker çöker).
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DOCKER: "1"
    restart: unless-stopped

  dlq-worker:
    image: dal-backend:prod
    command: npm run start:dlq
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DOCKER: "1"
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    restart: unless-stopped

  frontend:
    build:
      # Context repo köküne çekildi — Dockerfile'ın hem apps/frontend kaynak
      # dosyalarına hem infra/nginx config template'ine erişebilmesi için.
      # .dockerignore köke konuldu; node_modules/.cache vb. context'e girmez.
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://backend:3000}
    depends_on:
      - backend
    # nginx container içinde 5173'te dinler (default.conf.template); host:80 →
    # container:5173. Canlı sunucuda ters proxy/farklı host portu için
    # FRONTEND_HTTP_PORT ile override edilebilir.
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend:3000}
      # CSP Report-Only — nginx envsubst ile başlığa render edilir. Boş bırakılırsa
      # sadece 'self' geçerli; harici sağlayıcı varsa virgülle değil boşlukla
      # ayrılmış host listesi: "https://api.iyzipay.com https://maps.googleapis.com"
      # NOT: compose'da `:-""` default'u BOŞ değil literal iki-tırnak (") üretir;
      # nginx envsubst bunu CSP başlığına basınca dıştaki tırnağı kırar
      # ("unexpected \""). Boş default için tırnaksız `:-` kullanılır.
      CSP_CONNECT_SRC: ${CSP_CONNECT_SRC:-}
      CSP_SCRIPT_SRC: ${CSP_SCRIPT_SRC:-}
      CSP_IMG_SRC: ${CSP_IMG_SRC:-}
      CSP_MEDIA_SRC: ${CSP_MEDIA_SRC:-}
      CSP_STYLE_SRC: ${CSP_STYLE_SRC:-}
      CSP_REPORT_ENDPOINT: ${CSP_REPORT_ENDPOINT:-/csp-report}
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:

