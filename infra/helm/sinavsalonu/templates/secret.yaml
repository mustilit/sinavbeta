{{- if .Values.backend.secretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sinavsalonu.fullname" . }}-backend-secrets
  labels:
    {{- include "sinavsalonu.labels" . | nindent 4 }}
  # ÖNEMLİ: Production'da bu Secret'ı kaynak repoya commit ETMEYİN.
  # values.prod.yaml'ı dışarıda tutun (ör. AWS Secrets Manager + External Secrets Operator).
type: Opaque
stringData:
{{- range $k, $v := .Values.backend.secretEnv }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
